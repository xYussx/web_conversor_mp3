<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Conversor de Audio - M4A a MP3</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
    }
    #dropZone.dragover {
      border-color: #667eea;
      background-color: #f5f3ff;
    }
    .progress-bar {
      transition: width 0.3s ease;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    .spinner {
      width: 48px;
      height: 48px;
      border: 4px solid #e5e7eb;
      border-top-color: #667eea;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto;
    }
    .fade-in {
      animation: fadeIn 0.3s ease-in;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes pulse-glow {
      0%, 100% { box-shadow: 0 0 0 0 rgba(102, 126, 234, 0.4); }
      50% { box-shadow: 0 0 0 12px rgba(102, 126, 234, 0); }
    }
    .btn-download {
      animation: pulse-glow 1.5s infinite;
    }
  </style>
</head>
<body class="flex items-center justify-center p-4">
  <main class="w-full max-w-md">
    <div class="bg-white rounded-2xl shadow-2xl p-6 sm:p-8 fade-in">
      <div class="text-center mb-6">
        <div class="inline-flex items-center justify-center w-14 h-14 rounded-full bg-indigo-100 mb-4">
          <svg class="w-7 h-7 text-indigo-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19V6l12-3v13M9 19c0 1.105-1.343 2-3 2s-3-.895-3-2 1.343-2 3-2 3 .895 3 2zm12-3c0 1.105-1.343 2-3 2s-3-.895-3-2 1.343-2 3-2 3 .895 3 2zM9 10l12-3"/>
          </svg>
        </div>
        <h1 class="text-2xl font-bold text-gray-800">Conversor de Audio</h1>
        <p class="text-gray-500 text-sm mt-1">Convierte tus archivos <strong>.m4a</strong> a <strong>.mp3</strong> en segundos</p>
      </div>

      <form id="uploadForm" class="space-y-4">
        <div
          id="dropZone"
          class="border-2 border-dashed border-gray-300 rounded-xl p-8 text-center cursor-pointer transition-all duration-200 hover:border-indigo-400 hover:bg-indigo-50/50"
        >
          <svg class="w-10 h-10 mx-auto text-gray-400 mb-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"/>
          </svg>
          <p class="text-gray-600 font-medium" id="dropText">Arrastra tu archivo .m4a aquí</p>
          <p class="text-gray-400 text-sm mt-1">o</p>
          <label for="fileInput" class="inline-block mt-2 px-6 py-2.5 bg-indigo-600 text-white font-medium rounded-lg cursor-pointer hover:bg-indigo-700 transition-colors text-sm">
            Seleccionar archivo
          </label>
          <input type="file" id="fileInput" accept=".m4a" class="hidden">
          <p class="text-xs text-gray-400 mt-3">Solo archivos .m4a</p>
        </div>

        <div id="fileInfo" class="hidden bg-gray-50 rounded-lg p-3 flex items-center gap-3 fade-in">
          <svg class="w-6 h-6 text-indigo-500 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19V6l12-3v13M9 19c0 1.105-1.343 2-3 2s-3-.895-3-2 1.343-2 3-2 3 .895 3 2zm12-3c0 1.105-1.343 2-3 2s-3-.895-3-2 1.343-2 3-2 3 .895 3 2z"/>
          </svg>
          <div class="min-w-0">
            <p class="text-sm font-medium text-gray-700 truncate" id="fileName"></p>
            <p class="text-xs text-gray-400" id="fileSize"></p>
          </div>
          <button type="button" id="removeFile" class="ml-auto text-gray-400 hover:text-red-500 transition-colors">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
            </svg>
          </button>
        </div>

        <div id="status" class="hidden text-center py-6 fade-in">
          <div class="spinner"></div>
          <p class="text-gray-600 font-medium mt-4">Convirtiendo...</p>
          <p class="text-gray-400 text-sm mt-1">Esto tomará solo unos segundos</p>
          <div class="mt-4 w-full bg-gray-200 rounded-full h-2 overflow-hidden">
            <div class="progress-bar h-full bg-gradient-to-r from-indigo-500 to-purple-500 rounded-full animate-pulse" id="progressBar" style="width: 60%"></div>
          </div>
        </div>

        <div id="result" class="hidden text-center py-6 fade-in">
          <div class="inline-flex items-center justify-center w-16 h-16 rounded-full bg-green-100 mb-4">
            <svg class="w-8 h-8 text-green-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/>
            </svg>
          </div>
          <p class="text-lg font-semibold text-gray-800">¡Conversión exitosa!</p>
          <p class="text-sm text-gray-500 mt-1 mb-5">Tu archivo MP3 está listo</p>
          <button type="button" id="downloadBtn" class="btn-download w-full py-3 px-6 bg-gradient-to-r from-green-500 to-emerald-600 text-white font-semibold rounded-lg hover:from-green-600 hover:to-emerald-700 transition-all shadow-lg">
            <span class="flex items-center justify-center gap-2">
              <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 10v6m0 0l-3-3m3 3l3-3m2 8H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
              </svg>
              Descargar MP3
            </span>
          </button>
          <button type="button" id="convertAnother" class="mt-3 text-sm text-indigo-600 hover:text-indigo-800 font-medium transition-colors">
            Convertir otro archivo
          </button>
        </div>

        <div id="error" class="hidden bg-red-50 border border-red-200 text-red-700 rounded-lg p-4 fade-in" role="alert">
          <div class="flex items-start gap-3">
            <svg class="w-5 h-5 shrink-0 mt-0.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
            </svg>
            <div>
              <p class="font-medium">Error</p>
              <p class="text-sm mt-1" id="errorMessage"></p>
            </div>
          </div>
        </div>
      </form>

      <footer class="mt-6 text-center text-xs text-gray-400">
        Hecho con el ❤️ para mi EMY
      </footer>
    </div>
  </main>

  <script>
    (function () {
      const dropZone = document.getElementById('dropZone');
      const fileInput = document.getElementById('fileInput');
      const fileInfo = document.getElementById('fileInfo');
      const fileName = document.getElementById('fileName');
      const fileSize = document.getElementById('fileSize');
      const removeFile = document.getElementById('removeFile');
      const status = document.getElementById('status');
      const result = document.getElementById('result');
      const error = document.getElementById('error');
      const errorMessage = document.getElementById('errorMessage');
      const downloadBtn = document.getElementById('downloadBtn');
      const convertAnother = document.getElementById('convertAnother');
      const progressBar = document.getElementById('progressBar');

      let selectedFile = null;
      let downloadedUrl = null;

      function resetStatusUI() {
        status.classList.add('hidden');
        result.classList.add('hidden');
        error.classList.add('hidden');
        if (downloadedUrl) {
          URL.revokeObjectURL(downloadedUrl);
          downloadedUrl = null;
        }
      }

      function formatSize(bytes) {
        if (bytes < 1024) return bytes + ' B';
        if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
        return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
      }

      function showFile(file) {
        selectedFile = file;
        fileName.textContent = file.name;
        fileSize.textContent = formatSize(file.size);
        dropZone.classList.add('hidden');
        fileInfo.classList.remove('hidden');
        resetStatusUI();
        convertFile(file);
      }

      function removeSelectedFile() {
        selectedFile = null;
        fileInfo.classList.add('hidden');
        dropZone.classList.remove('hidden');
        fileInput.value = '';
        resetStatusUI();
      }

      function showError(msg) {
        status.classList.add('hidden');
        errorMessage.textContent = msg;
        error.classList.remove('hidden');
      }

      dropZone.addEventListener('dragenter', function (e) {
        e.preventDefault();
        e.stopPropagation();
        this.classList.add('dragover');
      });

      dropZone.addEventListener('dragover', function (e) {
        e.preventDefault();
        e.stopPropagation();
        this.classList.add('dragover');
      });

      dropZone.addEventListener('dragleave', function (e) {
        e.preventDefault();
        e.stopPropagation();
        this.classList.remove('dragover');
      });

      dropZone.addEventListener('drop', function (e) {
        e.preventDefault();
        e.stopPropagation();
        this.classList.remove('dragover');
        const files = e.dataTransfer.files;
        if (files.length > 0) validateAndShow(files[0]);
      });

      dropZone.addEventListener('click', function () {
        fileInput.click();
      });

      fileInput.addEventListener('change', function () {
        if (this.files.length > 0) validateAndShow(this.files[0]);
      });

      removeFile.addEventListener('click', removeSelectedFile);

      function validateAndShow(file) {
        if (!file.name.toLowerCase().endsWith('.m4a')) {
          showError('Solo se aceptan archivos con extensión .m4a');
          return;
        }
        showFile(file);
      }

      function convertFile(file) {
        resetStatusUI();
        status.classList.remove('hidden');
        progressBar.style.width = '30%';

        const formData = new FormData();
        formData.append('file', file);

        fetch('/convert', {
          method: 'POST',
          body: formData,
        })
        .then(async function (response) {
          progressBar.style.width = '90%';
          if (!response.ok) {
            const data = await response.json().catch(function () {
              return { error: 'Error inesperado del servidor' };
            });
            throw new Error(data.error || 'Error en la conversión');
          }
          const blob = await response.blob();
          progressBar.style.width = '100%';
          return blob;
        })
        .then(function (blob) {
          status.classList.add('hidden');
          downloadedUrl = URL.createObjectURL(blob);
          const filename = file.name.replace(/\.m4a$/i, '.mp3');
          downloadBtn.onclick = function () {
            const a = document.createElement('a');
            a.href = downloadedUrl;
            a.download = filename;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
          };
          downloadBtn.click();
          result.classList.remove('hidden');
        })
        .catch(function (err) {
          showError(err.message);
        });
      }

      convertAnother.addEventListener('click', function () {
        removeSelectedFile();
      });
    })();
  </script>
</body>
</html>
